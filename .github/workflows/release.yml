name: 构建与发布 (Build and Release)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: '发布版本标签 (例如: v2.0.0)'
        required: true
        default: 'v2.0.0'

permissions:
  contents: write

jobs:
  build:
    name: 编译 Windows 应用
    runs-on: windows-latest

    steps:
    - name: 检出代码 (Checkout)
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: 安装 .NET 环境
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x
    
    - name: 还原依赖 (Restore)
      working-directory: Services_CSharp
      run: dotnet restore

    - name: 编译并发布 (Build & Publish)
      working-directory: Services_CSharp
      run: |
        dotnet publish Services.App/Services.App.csproj -c Release -r win10-x64 --self-contained -p:PublishSingleFile=true -o publish/

    - name: 打包发布文件 (Zip)
      working-directory: Services_CSharp/publish
      run: |
        Compress-Archive -Path * -DestinationPath ../../Services.App-win10-x64.zip

    - name: 创建 GitHub Release
      if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
      uses: softprops/action-gh-release@v1
      with:
        files: Services.App-win10-x64.zip
        generate_release_notes: true
        tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}
        name: Release ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}
        draft: false
        prerelease: false
